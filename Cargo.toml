[package]
name = "pastor"
version = "0.5.1"
authors = ["Max Audron <audron@cocaine.farm>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tree_magic = { version = "0.2", features = ["staticmime"] }
rocket = "0.4"
bincode = "1.3"
serde_derive = "1.0"
serde = "1.0"
chrono = "0.4"
rand = "0.7"
sled = "0.34"
multipart = "0.17"
tera = "1.5"

[dependencies.rocket_contrib]
version = "0.4.0"
features = ["tera_templates"]
