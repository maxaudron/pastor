[package]
name = "pastor"
version = "0.5.3"
authors = ["Max Audron <audron@cocaine.farm>", "Lorenz Leitner <lrnz.ltnr@gmail.com"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tree_magic = { version = "0.2", features = ["staticmime"] }
mime_guess = "2.0.3"
rocket = "0.4"
bincode = "1.3"
serde_derive = "1.0"
serde = "1.0"
chrono = "0.4"
rand = "0.7"
sled = "0.34"
multipart = "0.17"
syntect = "4.5.0"
tera = "1.8.0"
phf = { version = "0.8.0", features = ["macros"] }