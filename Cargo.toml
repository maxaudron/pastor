[package]
name = "pastor"
description = "The pastebin that hopefully doesn't suck"

version = "0.10.1"
homepage = "https://gitlab.com/cocainefarm/pastor"
repository = "https://gitlab.com/cocainefarm/pastor"
documentation = "https://docs.rs/pastor"
readme = "README.txt"

authors = ["Max Audron <audron@cocaine.farm>", "Lorenz Leitner <lrnz.ltnr@gmail.com>"]
edition = "2018"
license = "ISC"

include = ["static/**/*", "templates/**/*", "src/**/*", "Cargo.toml"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tree_magic = { version = "0.2", features = ["staticmime"] }
mime_guess = "2.0"
rocket = "0.4"
bincode = "1.3"
serde_derive = "1.0"
serde = "1.0"
chrono = "0.4"
rand = "0.8"
sled = "0.34"
multipart = "0.17"
syntect = "4.5"
tera = "1.8"
phf = { version = "0.8", features = ["macros"] }
anyhow = "1"

tracing = "0.1"
tracing-subscriber = "0.2"

[build-dependencies]
grass = "0.10.4"
glob = "0.3.0"

[features]
default = ["iter_db"]

iter_db = []
iter_files = []
