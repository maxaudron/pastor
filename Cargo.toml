[package]
name = "pastor"
version = "0.9.0"
authors = ["Max Audron <audron@cocaine.farm>", "Lorenz Leitner <lrnz.ltnr@gmail.com"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tree_magic = { version = "0.2", features = ["staticmime"] }
mime_guess = "2.0"
rocket = "0.4"
bincode = "1.3"
serde_derive = "1.0"
serde = "1.0"
chrono = "0.4"
rand = "0.8"
sled = "0.34"
multipart = "0.17"
syntect = "4.5"
tera = "1.8"
phf = { version = "0.8", features = ["macros"] }

tracing = "0.1"
tracing-subscriber = "0.2"

[dev-dependencies]
once_cell = "1.7.2"

[build-dependencies]
grass = "0.10.4"
glob = "0.3.0"
